name: CI - Frontend React

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SmartC-Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: SmartC-Frontend

      - name: Run tests
        run: npm test -- --watch=false
        working-directory: SmartC-Frontend

      - name: Build
        run: npm run build
        working-directory: SmartC-Frontend